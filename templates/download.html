<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ST Affichage - Télécharger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="min-h-screen flex flex-col justify-center px-6 py-12 relative">

    <div class="max-w-md w-full mx-auto relative z-10">
        
        <!-- Subtitle like "AI STUDY ARCHITECT" -->
        <div class="flex items-center gap-2 mb-6">
            <span class="text-xs" style="color: var(--accent-primary);">✦</span>
            <span class="text-xs font-bold tracking-widest uppercase" style="color: var(--accent-primary);">PROJET INDÉPENDANT</span>
        </div>

        <!-- Massive Typography like screenshot -->
        <h1 class="text-[3.5rem] leading-[1.05] font-syne font-extrabold mb-10 tracking-tight" style="color: var(--text-main);">
            L'application<br>
            essentielle<br>
            pour les<br>
            <span class="text-gradient">étudiants ST.</span>
        </h1>

        <!-- Step 1 Label -->
        <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold" style="background: var(--surface); border: 1px solid var(--accent-primary); color: var(--text-main);">
                1
            </div>
            <span class="text-lg font-syne font-bold" style="color: var(--text-main);">Télécharger l'APK</span>
        </div>

        <!-- Dashed Upload-style Box -->
        <div class="dashed-box flex flex-col items-center">
            
            <!-- Icon Circle -->
            <div class="w-14 h-14 rounded-full flex items-center justify-center mb-4" style="background: var(--surface-hover); border: 1px solid var(--accent-primary); color: var(--accent-primary);">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </div>

            <!-- Download Button/Text -->
            <a href="/static/ST%20Affichage.apk" download class="text-lg font-bold mb-1 hover:underline decoration-2 underline-offset-4" style="color: var(--text-main);">
                Cliquez pour télécharger
            </a>
            <p class="text-sm" style="color: var(--accent-primary);">Fichier sécurisé : 1.9.1 (Beta)</p>
        </div>

        <!-- Instructions -->
        <div class="mt-8 text-center text-xs leading-relaxed" style="color: var(--text-muted);">
            <p class="mb-1">Conçu et développé par Adam Mila.</p>
            <p>Pour installer, acceptez l'autorisation "Sources inconnues" dans vos paramètres Android.</p>
        </div>

    </div>

</body>
</html>
