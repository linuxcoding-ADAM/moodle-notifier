<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ST Affichage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="pb-24">

    <!-- PAGE: HOME -->
    <div id="page-home" class="active">
        <div class="header-glass sticky top-0 z-50 px-6 py-5">
            <div class="flex flex-col items-center">
                <span class="text-[10px] font-bold tracking-[0.2em] text-blue-500 uppercase mb-1">Univ Bejaia</span>
                <h1 class="text-xl font-extrabold tracking-tight">ST Affichage</h1>
            </div>
        </div>
        <div class="px-4 mt-6">
            <div id="cards-container" class="min-h-[50vh]">
                <div class="loader"></div>
            </div>
            <div id="end-message" class="text-center text-xs text-gray-500 py-6 hidden">End of updates</div>
        </div>
    </div>

    <!-- PAGE: SETTINGS (Redesigned) -->
    <div id="page-settings" class="hidden">
        
        <!-- Header -->
        <div class="settings-header">
            <h1 class="settings-title">Settings</h1>
            <p class="settings-subtitle">Customize your app experience.</p>
        </div>

        <div class="px-5">
            
            <!-- Dark Mode Card -->
            <div class="settings-card">
                <div class="flex items-center">
                    <div class="icon-box">
                        <!-- Solid Moon Icon -->
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </div>
                    <span class="setting-label">Dark Mode</span>
                </div>
                <!-- Switch -->
                <div id="theme-switch" class="toggle-switch active" onclick="toggleTheme()">
                    <div class="toggle-dot"></div>
                </div>
            </div>

            <!-- Notifications Card -->
            <div class="settings-card">
                <div class="flex items-center">
                    <div class="icon-box">
                        <!-- Solid Bell Icon -->
                        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor"><path d="M12.02 2.909c-.373-1.708-2.652-1.727-2.98.053l-.936 6.315c-.297 1.636-1.936 3.737-3.155 3.737 2.145 3.321 8.528 3.332 10.655-.027-1.127-.197-2.67-2.128-2.887-3.71l-.7-6.368h.003zm-4.708 14.091c1.556 1.34 3.792 1.34 5.348 0"/></svg>
                    </div>
                    <span class="setting-label">Enable Notifications</span>
                </div>
                <!-- Switch -->
                <div id="notif-switch" class="toggle-switch active" onclick="toggleNotifications()">
                    <div class="toggle-dot"></div>
                </div>
            </div>

            <!-- Footer (Announcer App Style) -->
            <div class="app-footer">
                <div class="footer-badge">⚡ ANNOUNCER APP</div>
                <p class="text-xs text-gray-500">Version 1.4.0 Beta (Build 2026)</p>
                <p class="text-[10px] text-gray-600 mt-2">Made by Adam Mila</p>
            </div>

        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-5 left-5 right-5 h-16 glass-nav rounded-2xl flex items-center justify-around z-50 shadow-2xl">
        <button onclick="switchTab('home')" id="tab-home" class="nav-btn active flex flex-col items-center justify-center gap-1 w-full h-full rounded-l-2xl text-blue-500">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold">Home</span>
        </button>
        <div class="w-px h-8 bg-white/10"></div>
        <button onclick="switchTab('settings')" id="tab-settings" class="nav-btn text-gray-500 flex flex-col items-center justify-center gap-1 w-full h-full rounded-r-2xl">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold">Settings</span>
        </button>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
