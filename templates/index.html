<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ST Affichage</title>
    
    <!-- GOOGLE ANALYTICS START -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-6HH5ZV5VW8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-6HH5ZV5VW8');
    </script>
    <!-- GOOGLE ANALYTICS END -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0B1120">
</head>
<body class="overscroll-none">

    <!-- PAGE: HOME (Main Feed) -->
    <div id="page-home" class="active">
        
        <!-- HEADER -->
        <div id="main-header" class="header-glass sticky top-0 z-40 px-5 py-4 flex justify-between items-center transition-transform duration-300 shadow-sm">
            
            <!-- LEFT: Slider Menu Button (Hamburger/3 Dots) -->
            <button onclick="toggleDrawer()" class="w-10 h-10 flex items-center justify-start opacity-80 hover:opacity-100 active:scale-95 transition-all" style="color: var(--text-main);">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h10"></path>
                </svg>
            </button>

            <!-- CENTER: Logo -->
            <div class="flex flex-col items-center absolute left-1/2 transform -translate-x-1/2">
                <span class="text-[10px] font-bold tracking-[0.2em] text-blue-500 uppercase mb-0.5">Univ Bejaïa</span>
                <h1 class="text-[1.1rem] font-extrabold tracking-tight heading-text leading-none" style="color: var(--text-main);">ST Affichage</h1>
            </div>

            <!-- RIGHT: Search Buttons -->
            <div class="flex items-center gap-1">
                <button id="header-cancel-btn" onclick="cancelSearch()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-500/10 text-red-500 transition-all duration-300 opacity-0 pointer-events-none transform scale-90 absolute right-4">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <button onclick="toggleSearch()" class="w-10 h-10 flex items-center justify-end opacity-80 hover:opacity-100 active:scale-95 transition-all" style="color: var(--text-main);">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>
        </div>

        <!-- SEARCH BAR (Drops down) -->
        <div id="search-bar-container" class="fixed top-[74px] left-0 right-0 z-30 px-4 transition-all duration-300 transform -translate-y-[150%] opacity-0 pointer-events-none">
            <div class="p-1 rounded-2xl shadow-xl flex items-center gap-2 glass-drawer search-bar-inner">
                <svg class="w-5 h-5 ml-3 opacity-50" style="color: var(--text-main)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="search-input" placeholder="Search announcements..." class="w-full bg-transparent text-sm py-3 px-2 focus:outline-none placeholder-gray-500 font-medium" style="color: var(--text-main);">
            </div>
        </div>

        <!-- Content Area -->
        <div class="px-4 mt-4 pb-10 transition-all duration-300" id="content-area">
            <div id="cards-container" class="min-h-[100vh] max-w-md mx-auto">
                <div class="loader"></div>
            </div>
            <div id="end-message" class="text-center text-xs text-gray-400 py-8 hidden font-mono tracking-widest uppercase">Fin des annonces</div>
        </div>
    </div>

    <!-- 🟢 NEW: GLASS SIDE DRAWER OVERLAY 🟢 -->
    <div id="drawer-overlay" class="fixed inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity duration-300" onclick="toggleDrawer()"></div>

    <!-- 🟢 NEW: GLASS SIDE DRAWER MENU 🟢 -->
    <div id="side-drawer" class="glass-drawer fixed top-0 left-0 h-full w-[85%] max-w-[320px] z-50 transform -translate-x-full transition-transform duration-300 ease-out flex flex-col shadow-2xl overflow-y-auto">
        
        <!-- Drawer Header -->
        <div class="p-6 pb-4 border-b border-white/5 flex justify-between items-start">
            <div class="flex flex-col">
                <div class="w-12 h-12 bg-blue-500 rounded-[14px] flex items-center justify-center shadow-lg shadow-blue-500/20 mb-4">
                    <span class="text-white font-extrabold text-xl heading-text">st</span>
                </div>
                <h2 class="text-xl font-extrabold heading-text" style="color: var(--text-main);">ST Affichage</h2>
                <p class="text-xs opacity-60 font-mono mt-1" style="color: var(--text-muted);">v1.9.1 (Beta)</p>
            </div>
            <!-- Close Button -->
            <button onclick="toggleDrawer()" class="w-8 h-8 flex items-center justify-center rounded-full bg-black/10 active:scale-95" style="color: var(--text-main);">
                <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <!-- Drawer Content (Settings) -->
        <div class="p-5 flex-1">
            <h3 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-2">Apparence</h3>
            <div class="settings-group">
                <div class="settings-card" onclick="toggleTheme()">
                    <div class="flex items-center">
                        <div class="icon-box bg-theme">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                        </div>
                        <span class="setting-label">Mode Sombre</span>
                    </div>
                    <div id="theme-switch" class="toggle-switch">
                        <div class="toggle-dot"></div>
                    </div>
                </div>
            </div>

            <h3 class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-2 ml-2 mt-6">Système & Support</h3>
            <div class="settings-group">
                <div class="settings-card" onclick="hardReloadApp(); toggleDrawer();">
                    <div class="flex items-center">
                        <div class="icon-box bg-orange">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </div>
                        <div class="flex flex-col">
                            <span class="setting-label">Rafraîchir l'app</span>
                        </div>
                    </div>
                </div>

                <div class="settings-card" onclick="contactDev()">
                    <div class="flex items-center">
                        <div class="icon-box bg-purple">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </div>
                        <span class="setting-label">Signaler un bug</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 mt-6 ml-3">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] text-green-500 font-bold uppercase tracking-wider">Serveur en ligne</span>
            </div>
        </div>

        <!-- Drawer Footer -->
        <div class="p-6 text-center border-t border-white/5 pb-8">
            <p class="text-xs font-semibold" style="color: var(--text-main);">Designed and developed by</p>
            <p class="text-sm font-extrabold mt-1 heading-text text-blue-500">Adam Mila</p>
        </div>
    </div>

    <!-- Keep this hidden so script.js doesn't crash if it looks for it -->
    <div id="page-settings" class="hidden"></div>
    <div id="bottom-nav" class="hidden"></div>

    <!-- UI Logic for the Slider (Independent from script.js) -->
    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('side-drawer');
            const overlay = document.getElementById('drawer-overlay');
            
            if (drawer.classList.contains('-translate-x-full')) {
                // Open Drawer
                overlay.classList.remove('hidden');
                // Tiny delay to allow display:block to apply before animating opacity
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    drawer.classList.remove('-translate-x-full');
                }, 10);
            } else {
                // Close Drawer
                drawer.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                // Wait for animation to finish before hiding element
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            }
        }
    </script>

    <!-- Core App Logic (Untouched) -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
                            </html>
