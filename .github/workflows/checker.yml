name: Check Moodle Announcements

on:
  # This runs the script on a schedule
  schedule:
    # Runs every 10 minutes.
    - cron: '*/10 * * * *'
  
  # This also allows you to run it manually from the Actions tab for testing
  workflow_dispatch:

jobs:
  run-checker:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checks out your repository's code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Sets up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Step 3: Installs the necessary libraries
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Runs your Python script
      - name: Run Moodle Checker
        env:
          MOODLE_USERNAME: ${{ secrets.MOODLE_USERNAME }}
          MOODLE_PASSWORD: ${{ secrets.MOODLE_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python moodle_checker.py # <-- IMPORTANT: Change this to your script's filename

      # Step 5: Commits the updated "memory" file back to the repository
      - name: Commit and Push updated seen_ids.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          # Only commit if the file has actually changed
          git diff --staged --quiet || git commit -m "Update seen announcements list"
          git push
